name: Release

on:
  push:
    tags:
      - v*
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to publish, for example v0.1.0
        required: true
        type: string
      latest:
        description: Also publish the Docker image with the latest tag
        required: false
        default: true
        type: boolean

env:
  DATABASE_URL: file:../data/hf-space-manager.db
  APP_ENCRYPTION_KEY: "12345678901234567890123456789012"
  BOOTSTRAP_ADMIN_NAME: CI Admin
  BOOTSTRAP_ADMIN_EMAIL: ci@example.com
  HF_SYNC_INTERVAL_SECONDS: "300"
  HF_WAKE_LOOKAHEAD_SECONDS: "600"
  INTERNAL_WEB_BASE_URL: http://127.0.0.1:3000
  INTERNAL_EVENT_TOKEN: "12345678901234567890123456789012"

jobs:
  metadata:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.meta.outputs.tag }}
      version: ${{ steps.meta.outputs.version }}
      image: ${{ steps.meta.outputs.image }}
      latest: ${{ steps.meta.outputs.latest }}

    steps:
      - id: meta
        name: Resolve release metadata
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            tag="${GITHUB_REF#refs/tags/}"
          else
            tag="${{ inputs.tag }}"
          fi

          if [[ -z "$tag" ]]; then
            echo "Release tag is required." >&2
            exit 1
          fi

          version="${tag#v}"
          image="ghcr.io/${GITHUB_REPOSITORY,,}"

          if [[ "$tag" == *-* ]]; then
            latest="false"
          elif [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            latest="${{ inputs.latest }}"
          else
            latest="true"
          fi

          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "image=$image" >> "$GITHUB_OUTPUT"
          echo "latest=$latest" >> "$GITHUB_OUTPUT"

  source:
    runs-on: ubuntu-latest
    needs: metadata
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create source archives
        shell: bash
        run: |
          mkdir -p dist/source
          git archive --format=tar.gz --output "dist/source/hf-space-manager-${{ needs.metadata.outputs.version }}-source.tar.gz" HEAD
          git archive --format=zip --output "dist/source/hf-space-manager-${{ needs.metadata.outputs.version }}-source.zip" HEAD

      - name: Upload source archives
        uses: actions/upload-artifact@v4
        with:
          name: release-source
          path: dist/source/*
          if-no-files-found: error

  electron:
    runs-on: ${{ matrix.os }}
    needs: metadata
    strategy:
      fail-fast: false
      matrix:
        include:
          - id: linux
            os: ubuntu-latest
            platform: linux
            target: AppImage
            artifact_glob: dist/electron/*.AppImage
          - id: macos
            os: macos-latest
            platform: mac
            target: zip
            artifact_glob: dist/electron/*.zip
          - id: windows
            os: windows-latest
            platform: win
            target: portable
            artifact_glob: dist/electron/*.exe

    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Next.js runtime
        run: pnpm build

      - name: Build Electron distribution
        run: pnpm exec electron-builder --config electron-builder.yml --${{ matrix.platform }} ${{ matrix.target }} --publish never
        shell: bash

      - name: Upload Electron release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-electron-${{ matrix.id }}
          path: ${{ matrix.artifact_glob }}
          if-no-files-found: error

  docker:
    runs-on: ubuntu-latest
    needs: metadata
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare Docker metadata
        id: docker_meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ needs.metadata.outputs.image }}
          tags: |
            type=raw,value=${{ needs.metadata.outputs.version }}
            type=raw,value=${{ needs.metadata.outputs.tag }}
            type=sha,format=short,prefix=sha-
            type=raw,value=latest,enable=${{ needs.metadata.outputs.latest == 'true' }}

      - name: Build and push Docker image
        id: docker_push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.docker_meta.outputs.tags }}
          labels: ${{ steps.docker_meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Export Docker OCI archive
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          outputs: type=oci,dest=dist/docker/hf-space-manager-${{ needs.metadata.outputs.version }}-linux-amd64.oci.tar
          cache-from: type=gha

      - name: Write Docker release manifest
        shell: bash
        run: |
          mkdir -p dist/docker
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          tags = [tag for tag in os.environ["DOCKER_TAGS"].splitlines() if tag.strip()]
          payload = {
              "image": os.environ["DOCKER_IMAGE"],
              "tag": os.environ["RELEASE_TAG"],
              "version": os.environ["RELEASE_VERSION"],
              "digest": os.environ["DOCKER_DIGEST"],
              "tags": tags,
          }
          output_path = Path("dist/docker") / f"hf-space-manager-{os.environ['RELEASE_VERSION']}-ghcr.json"
          output_path.write_text(json.dumps(payload, indent=2) + "\n", encoding="utf-8")
          PY
        env:
          DOCKER_TAGS: ${{ steps.docker_meta.outputs.tags }}
          DOCKER_IMAGE: ${{ needs.metadata.outputs.image }}
          DOCKER_DIGEST: ${{ steps.docker_push.outputs.digest }}
          RELEASE_TAG: ${{ needs.metadata.outputs.tag }}
          RELEASE_VERSION: ${{ needs.metadata.outputs.version }}

      - name: Upload Docker release assets
        uses: actions/upload-artifact@v4
        with:
          name: release-docker
          path: dist/docker/*
          if-no-files-found: error

  publish:
    runs-on: ubuntu-latest
    needs:
      - metadata
      - source
      - electron
      - docker
    permissions:
      contents: write

    steps:
      - name: Download release assets
        uses: actions/download-artifact@v4
        with:
          pattern: release-*
          path: release-assets
          merge-multiple: true

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.metadata.outputs.tag }}
          target_commitish: ${{ github.sha }}
          name: HF Space Manager ${{ needs.metadata.outputs.tag }}
          generate_release_notes: true
          prerelease: ${{ contains(needs.metadata.outputs.tag, '-') }}
          files: |
            release-assets/**/*.AppImage
            release-assets/**/*.zip
            release-assets/**/*.exe
            release-assets/**/*-source.tar.gz
            release-assets/**/*-source.zip
            release-assets/**/*.oci.tar
            release-assets/**/*-ghcr.json
name: Build Distributions

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  DATABASE_URL: file:../data/hf-space-manager.db
  APP_ENCRYPTION_KEY: 12345678901234567890123456789012
  BOOTSTRAP_ADMIN_NAME: CI Admin
  BOOTSTRAP_ADMIN_EMAIL: ci@example.com
  HF_SYNC_INTERVAL_SECONDS: "300"
  HF_WAKE_LOOKAHEAD_SECONDS: "600"
  INTERNAL_WEB_BASE_URL: http://127.0.0.1:3000
  INTERNAL_EVENT_TOKEN: 12345678901234567890123456789012

jobs:
  docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          load: true
          tags: hf-space-manager:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

  electron:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - id: linux
            os: ubuntu-latest
            platform: linux
            target: AppImage
          - id: macos
            os: macos-latest
            platform: mac
            target: zip
          - id: windows
            os: windows-latest
            platform: win
            target: portable

    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Next.js runtime
        run: pnpm build

      - name: Build Electron distribution
        run: pnpm exec electron-builder --config electron-builder.yml --${{ matrix.platform }} ${{ matrix.target }} --publish never
        shell: bash

      - name: Upload Electron artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-distribution-${{ matrix.id }}
          path: |
            dist/electron/**/*
            !dist/electron/builder-debug.yml
            !dist/electron/builder-effective-config.yaml
          if-no-files-found: error
          retention-days: 7